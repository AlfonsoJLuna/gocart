{{define "currencies_edit"}}
{{template "top" .}}

<div class="header">
    <h1>Currencies / {{.OriginalName}}</h1>
    <div class="button-group">
        <a href="/currencies" class="button button-secondary">← Back</a>
    </div>
</div>

{{template "flash-error" .Error}}
{{template "flash-success" .Success}}

<div class="card">
    <form method="POST" action="/currencies/{{.Currency.ID}}">
        <div class="form-field">
            <label>ISO Code</label>
            <input type="text" name="iso_code" value="{{.Currency.ISOCode}}" readonly>
        </div>
        <div class="form-field">
            <label>Name</label>
            <input type="text" name="name" value="{{.Currency.Name}}" required>
        </div>
        <div class="form-field">
            <label>Name Alt</label>
            <input type="text" name="name_alt" value="{{.Currency.NameAlt}}">
        </div>
        <div class="form-field">
            <label>Decimals</label>
            <input type="number" name="decimals" value="{{.Currency.Decimals}}" readonly>
        </div>
        <div class="form-field">
            <label>FX Rate</label>
            <input type="number" name="fx_rate" value="{{printf "%.2f" .Currency.FXRate}}" readonly>
        </div>
        <div class="form-field">
            <div class="form-checkbox">
                <input type="checkbox" name="is_enabled" {{if .Currency.IsEnabled}}checked{{end}}>
                <span>Enable this currency</span>
            </div>
        </div>
        <div class="button-group">
            <button type="submit" class="button button-primary">Save</button>
            <a href="/currencies" class="button button-secondary">Cancel</a>
        </div>
    </form>
</div>

{{template "bottom" .}}
{{end}}
