{{define "css-variables"}}
    <style>
        :root {
            --sidebar-width:    200px;

            --space-1:          4px;
            --space-2:          8px;
            --space-3:          12px;
            --space-4:          16px;
            --space-5:          24px;
            --space-6:          32px;
            --space-7:          40px;
            --space-8:          48px;

            --text-xs:          10px;
            --text-s:           12px;
            --text-m:           14px;
            --text-l:           16px;
            --text-xl:          20px;
            --text-2xl:         24px;

            --radius-small:     4px;
            --radius-base:      8px;

            --weight-light:     300;
            --weight-normal:    400;
            --weight-medium:    500;
            --weight-semibold:  600;
            --weight-bold:      700;

            /* Theme: Light (default) */
            --color-border:         #e2e2da;
            --color-bg-back:        #f5f5f0;
            --color-bg-front:       #ffffff;
            --color-bg-hover:       #f0f0eb;
            --color-bg-green:       #e6f4ea;
            --color-bg-red:         #fce8e8;
            --color-bg-blue:        #e8f0fe;
            --color-bg-purple:      #f3e8fd;
            --color-text-base:      #1a1a1a;
            --color-text-muted:     #888880;
            --color-text-green:     #2d7a3a;
            --color-text-red:       #c0392b;
            --color-text-blue:      #1a56b0;
            --color-text-purple:    #7e22ce;
            --color-accent:         #6366f1;
            --color-accent-dark:    #4f51d8;
        }

        /* Theme: Dark */
        [data-theme="dark"] {
            --color-border:         #2a2d3e;
            --color-bg-back:        #0f1117;
            --color-bg-front:       #1a1d27;
            --color-bg-hover:       #1f2235;
            --color-bg-green:       #14281d;
            --color-bg-red:         #2d1414;
            --color-bg-blue:        #141e2d;
            --color-bg-purple:      #1e1428;
            --color-text-base:      #e2e8f0;
            --color-text-muted:     #64748b;
            --color-text-green:     #4ade80;
            --color-text-red:       #f87171;
            --color-text-blue:      #60a5fa;
            --color-text-purple:    #c084fc;
            --color-accent:         #6366f1;
            --color-accent-dark:    #4f51d8;
        }
    </style>
{{end}}
